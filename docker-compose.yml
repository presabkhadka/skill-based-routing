services:
  db:
    image: postgres:16-alpine
    container_name: skill-routing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skill_routing
    ports:
      - "5434:5432"
    volumes:
      - skill_routing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skill_routing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  skill_routing_pgdata:
